name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 2026-06-17

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v8.2.0 2026-06-03
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv venv --python 3.13 .venv

      - name: Install dependencies
        run: uv pip install --python .venv/bin/python -r requirements_dev.txt

      - name: Ruff check
        run: .venv/bin/ruff check .

      - name: Ruff format check
        run: .venv/bin/ruff format --check .

      - name: Run tests with coverage
        run: |
          .venv/bin/python -m pytest tests/ \
            --cov=custom_components/incendiscat \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=95
